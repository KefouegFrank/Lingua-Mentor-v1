[tool.poetry]
name = "ai-service"
version = "0.1.0"
description = "LinguaMentor AI orchestration service — the five engines"

[tool.poetry.dependencies]
python = "^3.12"
fastapi = "^0.115"
uvicorn = "^0.34"       # ASGI server — Dockerfile CMD runs it
asyncpg = "^0.29"       # runtime DB queries — see app/db/repositories/
sqlalchemy = "^2.0"     # models are ORM-only, for Alembic autogenerate — see app/db/models/
alembic = "^1.13"
pydantic = "^2.9"
pydantic-settings = "^2.6"
httpx = "^0.28"         # outbound LLM/ASR/TTS provider calls
pyyaml = "^6.0"         # exam definitions in app/config/exams/ are YAML, not code
greenlet = "^3.1"       # required by SQLAlchemy async engine (Alembic migrations)

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.poetry.group.dev.dependencies]
pytest = "^8.3"
pytest-asyncio = ">=0.25,<1.5"
ruff = "^0.8"
mypy = "^1.13"
types-pyyaml = "^6.0"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
target-version = "py312"
line-length = 100
# Alembic revision scripts are generated by `alembic revision --autogenerate`
# and then committed as an immutable historical record of a schema change —
# they're never hand-styled, so linting them for style is just noise.
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
# A starter set, not the full pedantic catalogue: pyflakes (unused imports/
# vars, undefined names — the real bug-catchers), pycodestyle, isort, and
# pyupgrade (flags old-style syntax a 3.12-only codebase has no reason to
# keep). Bugbear stays off for now — it's stricter than this early-stage
# codebase is ready for; revisit once the engines/repositories layer settles.
select = ["E", "F", "I", "UP"]
ignore = [
    # Import-time side effects for route registration (FastAPI routers) and
    # SQLAlchemy model registration both rely on module-level statements
    # after other imports — this is the standard pattern, not a bug.
    "E402",
]

[tool.ruff.lint.per-file-ignores]
# Alembic's env.py is generated scaffolding that runs top-level migration
# logic by convention; test files commonly shadow fixture names, use
# assert-heavy style pytest expects, and lean on wide inline dict literals
# for tabular fixture data — wrapping those hurts readability rather than
# helping it, so line length isn't enforced there.
"alembic/env.py" = ["E402"]
"tests/**/*.py" = ["F401", "F811", "E501"]
# The task-prompt f-strings here are LLM-facing prose, not code — they're
# exactly what gets sent to the grader model and are tuned against the
# calibration harness (see app/calibration/). Reflowing them to satisfy line
# length would edit the actual prompt text, which is a scoring-behavior
# change in disguise, not a style fix.
"app/engines/writing_evaluation/prompt_builder.py" = ["E501"]

[tool.mypy]
python_version = "3.12"
# Loose but real: catches undefined attributes, wrong call signatures, and
# None-handling bugs across the codebase's own modules, without demanding
# full annotation coverage on a codebase still finding its shape.
ignore_missing_imports = true
check_untyped_defs = true
warn_unused_ignores = true
warn_redundant_casts = true
disallow_untyped_defs = false
exclude = ["alembic/"]
