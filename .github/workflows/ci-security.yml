name: CI - security
on:
  # Not path-filtered, unlike the per-service ci-*.yml workflows: a secret
  # can be committed into any file in any directory, so there is no subset
  # of paths where skipping this would be safe.
  pull_request:
  workflow_call:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 — the default shallow clone would only expose the tip
      # commit, and the whole point is catching a secret introduced in an
      # earlier commit and later "removed" in a follow-up. Deleting a secret
      # in a subsequent commit does not remove it from history; the credential
      # stays readable and stays compromised until it's rotated.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Installed from a pinned release binary rather than gitleaks-action.
      # The action is free for personal accounts but requires a paid
      # GITLEAKS_LICENSE once a repo lives under a GitHub *organisation* —
      # so the moment this repo moves into an org (which is what happens when
      # a startup incorporates), the action would start failing CI for a
      # licensing reason that has nothing to do with code. The binary has no
      # such condition.
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.21.2"
        run: |
          curl -sSL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      # --redact: findings are printed to a CI log that is readable by anyone
      # who can see the repo. An unredacted report would take a secret that
      # leaked into git history and additionally publish it in plaintext to
      # the build log — turning detection into a second disclosure.
      #
      # Scans full history on every run. That's ~200ms at this repo's size;
      # if it ever gets slow enough to notice, scope it with --log-opts to
      # the PR range rather than dropping the check.
      - name: Scan git history for secrets
        run: gitleaks detect --source . --redact --no-banner --verbose
