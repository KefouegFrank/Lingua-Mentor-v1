name: CI - api-gateway
on:
  pull_request:
    paths:
      - "apps/api-gateway/**"
      - "packages/**"
  # Callable by deploy.yml so a push to main runs these exact checks before
  # anything is built or shipped. The `paths` filter above deliberately does
  # not apply to a workflow_call: on the PR path it's a speed optimisation
  # (skip unaffected services), but a deploy ships every service, so every
  # service gets verified regardless of what the diff touched.
  workflow_call:
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # node-version-file, not a literal — see ci-frontend.yml for why.
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      # --filter api-gateway... : matches the Dockerfile's own install
      # filter — pulls in @lingumentor/shared-schemas, the workspace
      # dependency api-gateway needs built before it can typecheck/build.
      - run: pnpm install --frozen-lockfile --filter api-gateway...

      - run: pnpm --filter @lingumentor/shared-schemas build

      - run: pnpm --filter api-gateway lint
      - run: pnpm --filter api-gateway test
      # api-gateway has no separate typecheck script — `tsc` (its build
      # step) does the type check as part of compiling to dist/.
      - run: pnpm --filter api-gateway build
