name: CI - worker
on:
  pull_request:
    paths:
      - "apps/worker/**"
  # See ci-api-gateway.yml for why workflow_call carries no paths filter.
  workflow_call:
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/worker
    steps:
      - uses: actions/checkout@v7

      # Reads .python-version at the repo root — see ci-ai-service.yml.
      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "2.4.1"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry venv
        uses: actions/cache@v4
        with:
          path: apps/worker/.venv
          key: worker-poetry-${{ runner.os }}-${{ hashFiles('apps/worker/poetry.lock') }}

      # --no-root: same package-mode caveat as ai-service — worker is run
      # as `python -m app.main`, not installed as a package.
      - run: poetry install --no-root --sync

      - run: poetry run ruff check .
      - run: poetry run mypy app
      - run: poetry run pytest -q
