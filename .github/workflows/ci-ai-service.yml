name: CI - ai-service
on:
  pull_request:
    paths:
      - "apps/ai-service/**"
  # See ci-api-gateway.yml for why workflow_call carries no paths filter.
  workflow_call:
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ai-service
    steps:
      - uses: actions/checkout@v7

      # Reads .python-version at the repo root — same single-source rule the
      # Node workflows follow with .nvmrc. Matches the python:3.12-slim base
      # image in this service's Dockerfile.
      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "2.4.1" # matches the sandbox's verified poetry version
          virtualenvs-create: true
          virtualenvs-in-project: true

      # Cache keyed on the lockfile hash: any dependency change (including
      # a stray drift between pyproject.toml and poetry.lock) busts the
      # cache instead of silently reusing a stale venv.
      - name: Cache Poetry venv
        uses: actions/cache@v4
        with:
          path: apps/ai-service/.venv
          key: ai-service-poetry-${{ runner.os }}-${{ hashFiles('apps/ai-service/poetry.lock') }}

      # --no-root: this project has no [project]/packages layout for
      # poetry's package mode (it's run via `uvicorn app.main:app`, not
      # imported as an installed package) — installing the root package
      # fails with "No file/folder found for package ai-service" without
      # this flag. The Dockerfile already installs the same way.
      - run: poetry install --no-root --sync

      - run: poetry run ruff check .
      - run: poetry run mypy app
      - run: poetry run pytest -q
