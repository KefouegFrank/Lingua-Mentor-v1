name: CI - frontend
on:
  pull_request:
    paths:
      - "apps/frontend/**"
      - "packages/**"
  # See ci-api-gateway.yml for why workflow_call carries no paths filter.
  workflow_call:
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # node-version-file keeps this in lockstep with .nvmrc, root
      # package.json engines (>=24), and api-gateway's Dockerfile — CI that
      # pins its own literal drifts from the runtime that actually ships,
      # and then only production finds out.
      # Two setup-node steps: corepack (which reads the packageManager
      # field, pnpm@9.0.0) has to be enabled before cache: 'pnpm' can find
      # pnpm on PATH to resolve the store location.
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      # --filter frontend... : frontend plus the workspace packages it
      # depends on (@lingumentor/shared-schemas), same convention the
      # api-gateway Dockerfile uses for its own filter.
      - run: pnpm install --frozen-lockfile --filter frontend...

      # shared-schemas is consumed as source-built workspace:* — build it
      # before frontend's own steps need it (typecheck/build resolve it via
      # the workspace symlink, not a published package).
      - run: pnpm --filter @lingumentor/shared-schemas build

      - run: pnpm --filter frontend lint
      - run: pnpm --filter frontend typecheck
      - run: pnpm --filter frontend test
      - run: pnpm --filter frontend build
