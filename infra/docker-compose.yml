# Local development compose file.
# Postgres is NOT included here — connect to a Neon dev branch instead,
# per deployment patch §3.1 (Neon branching also gives you free per-feature DB branches locally).
version: "3.9"
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  api-gateway:
    # Root context, not ../apps/api-gateway — it depends on the workspace
    # package @lingumentor/shared-schemas, so the build needs to see the
    # whole monorepo, not just this one app's directory. See the Dockerfile.
    build:
      context: ..
      dockerfile: apps/api-gateway/Dockerfile
    env_file: ../apps/api-gateway/.env
    volumes:
      # JWT keys (scripts/generate-jwt-keys.sh) are mounted, never baked
      # into the image.
      - ../apps/api-gateway/keys:/app/keys:ro
    ports:
      - "3000:3000"
    depends_on:
      - redis

  ai-service:
    build: ../apps/ai-service
    env_file: ../apps/ai-service/.env
    ports:
      - "8000:8000"
    depends_on:
      - redis

  worker:
    build: ../apps/worker
    env_file: ../apps/worker/.env
    depends_on:
      - redis
      - ai-service

volumes:
  redis-data:
